name: NLP Text Classification Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  train-and-evaluate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r /Users/shouryarghyapatra/Documents/GitHub/flagged-text-classification/flagged-text-classification/requirements.txt

      - name: Run Training Script
        run: python src/train.py
